<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartClass AI</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Overlay -->
        <div class="sidebar-backdrop" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="images/logo.jpeg" alt="SmartClass AI Logo" class="me-2">
                    <span>SmartClass AI</span>
                </div>
                <!-- Close Button (Mobile Only) -->
                <button class="btn btn-link text-dark d-lg-none p-0 border-0" id="closeSidebarBtn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item active ripple">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="/enroll" class="nav-item ripple">
                    <i data-lucide="user-plus"></i> Attendance
                </a>
                <a href="/records" class="nav-item ripple">
                    <i data-lucide="bar-chart-2"></i> Analytics
                </a>
                <a href="/settings" class="nav-item ripple">
                    <i data-lucide="settings"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="nav-left d-flex align-items-center gap-3">
                    <!-- Hamburger Toggle (Mobile Only) -->
                    <button class="btn btn-light d-lg-none d-flex align-items-center justify-content-center p-2 rounded-3 border-0 shadow-sm" id="sidebarToggleBtn">
                        <i data-lucide="menu"></i>
                    </button>
                    <h5 class="mb-0 fw-bold d-none d-sm-block">Dashboard</h5>
                </div>
                <div class="nav-right d-flex align-items-center gap-3 gap-md-4">
                    <div class="system-status d-none d-md-flex align-items-center">
                        <span class="status-dot pulse"></span>
                        <span class="status-text text-success small fw-semibold">System Active</span>
                    </div>
                    <div class="current-time small fw-medium text-muted" id="clock">
                        --:--:--
                    </div>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Profile" class="rounded-circle profile-img">
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="content-wrapper p-4 p-md-5 page-transition">
                <div class="ultrawide-container">
                    
<div class="row g-4 pt-2">
    <div class="col-12">
        <div class="glass-card p-4 animate-fade-in stagger-1">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-light">
                <div class="d-flex align-items-center gap-2">
                    <div class="stat-card-icon bg-blue-soft mb-0" style="width: 38px; height: 38px;">
                        <i data-lucide="database" style="width: 20px; height: 20px;"></i>
                    </div>
                    <h5 class="mb-0 fw-bold">Attendance Archive</h5>
                </div>
                <div class="d-flex gap-2">
                    <a href="/analysis" class="btn btn-outline-secondary btn-sm d-flex align-items-center gap-2 ripple">
                        <i data-lucide="trending-up" style="width: 16px; height: 16px;"></i> View Trends
                    </a>
                    <a href="/export_csv" class="btn btn-primary btn-sm d-flex align-items-center gap-2 ripple">
                        <i data-lucide="download" style="width: 16px; height: 16px;"></i> Export CSV
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject</th>
                            <th>Roll Number</th>
                            <th>Student Name</th>
                            <th>Status</th>
                            <th class="text-end">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                    <tbody id="recordsTableBody">
                        <tr>
                            <td colspan="6" class="text-center py-5 text-muted">
                                <div class="spinner-border spinner-border-sm text-primary mb-2" role="status"></div>
                                <br>Loading attendance records...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <script>
                document.addEventListener('DOMContentLoaded', async () => {
                    const tbody = document.getElementById('recordsTableBody');
                    try {
                        const response = await fetch('/api/getRecords');
                        
                        if (response.status === 503) {
                            tbody.innerHTML = `
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i data-lucide="alert-triangle" class="mb-2 text-warning" style="width: 32px; height: 32px;"></i>
                                        <br><strong>Setup Required</strong>: Please configure your Supabase Database Keys in Vercel to view records.
                                    </td>
                                </tr>
                            `;
                            lucide.createIcons();
                            return;
                        }

                        if (!response.ok) throw new Error('API Error');
                        const data = await response.json();
                        
                        if (data.logs && data.logs.length > 0) {
                            tbody.innerHTML = '';
                            data.logs.forEach(log => {
                                 const tr = document.createElement('tr');
                                 tr.classList.add('animate-fade-in');
                                 tr.innerHTML = `
                                     <td class="text-secondary small">${log.date}</td>
                                     <td class="fw-medium text-dark">${log.subject || 'General'}</td>
                                     <td>
                                         <span class="bg-light px-2 py-1 rounded small text-secondary fw-semibold border">${log.roll}</span>
                                     </td>
                                     <td>${log.name}</td>
                                     <td>
                                         <span class="badge-status badge-${log.status.toLowerCase()}">
                                             ${log.status}
                                         </span>
                                     </td>
                                     <td class="text-end">
                                         <!-- Removed delete button for serverless safety, can be added later as API -->
                                         <span class="text-muted small">Archived</span>
                                     </td>
                                 `;
                                 tbody.appendChild(tr);
                            });
                        } else {
                            tbody.innerHTML = `
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i data-lucide="inbox" class="mb-2 text-secondary" style="width: 32px; height: 32px; opacity: 0.5;"></i>
                                        <br>No records found.
                                    </td>
                                </tr>
                            `;
                            lucide.createIcons();
                        }
                    } catch (error) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" class="text-center py-5 text-danger">
                                    <i data-lucide="wifi-off" class="mb-2 text-danger" style="width: 32px; height: 32px;"></i>
                                    <br>Failed to retrieve records. Check your internet connection.
                                </td>
                            </tr>
                        `;
                        lucide.createIcons();
                    }
                });
            </script>
                </table>
            </div>
        </div>
    </div>
</div>

                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Responsive Sidebar Toggle Logic
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');

            function toggleSidebar() {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            }

            if(toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });
    </script>
    
    <!-- Global Toast Container for AI Activity Feed -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1055;">
            <!-- Toasts will be injected dynamically here -->
        </div>
    </div>
    
</body>
</html>
