<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartClass AI</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Overlay -->
        <div class="sidebar-backdrop" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <img src="images/logo.jpeg" alt="SmartClass AI Logo" class="me-2">
                    <span>SmartClass AI</span>
                </div>
                <!-- Close Button (Mobile Only) -->
                <button class="btn btn-link text-dark d-lg-none p-0 border-0" id="closeSidebarBtn">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item active ripple">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="/enroll" class="nav-item ripple">
                    <i data-lucide="user-plus"></i> Attendance
                </a>
                <a href="/records" class="nav-item ripple">
                    <i data-lucide="bar-chart-2"></i> Analytics
                </a>
                <a href="/settings" class="nav-item ripple">
                    <i data-lucide="settings"></i> Settings
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="nav-left d-flex align-items-center gap-3">
                    <!-- Hamburger Toggle (Mobile Only) -->
                    <button class="btn btn-light d-lg-none d-flex align-items-center justify-content-center p-2 rounded-3 border-0 shadow-sm" id="sidebarToggleBtn">
                        <i data-lucide="menu"></i>
                    </button>
                    <h5 class="mb-0 fw-bold d-none d-sm-block">Dashboard</h5>
                </div>
                <div class="nav-right d-flex align-items-center gap-3 gap-md-4">
                    <div class="system-status d-none d-md-flex align-items-center">
                        <span class="status-dot pulse"></span>
                        <span class="status-text text-success small fw-semibold">System Active</span>
                    </div>
                    <div class="current-time small fw-medium text-muted" id="clock">
                        --:--:--
                    </div>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="Profile" class="rounded-circle profile-img">
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="content-wrapper p-4 p-md-5 page-transition">
                <div class="ultrawide-container">
                    
<div class="row g-4 pt-2">
    <!-- Camera Section -->
    <div class="col-lg-7 col-xl-8">
        <div class="glass-card p-4 h-100 animate-fade-in stagger-1">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h6 class="mb-0 fw-bold">Registration Camera</h6>
                <div class="system-status">
                    <span class="status-dot pulse"></span>
                    <span class="text-success small fw-semibold">Feed Active</span>
                </div>
            </div>
            <div class="video-container" style="height: 480px;">
                <img src="video_feed.html" class="w-100 h-100" style="object-fit: cover; border-radius: 12px;">
            </div>
        </div>
    </div>
    
    <!-- Form Section -->
    <div class="col-lg-5 col-xl-4">
        <div class="glass-card p-4 h-100 animate-fade-in stagger-2">
            <h5 class="fw-bold mb-1">New Enrollment</h5>
            <p class="text-muted small mb-4">Register student face data</p>
            
            <form action="/capture_photos" method="POST">
                <div class="mb-3">
                    <label class="text-secondary small fw-medium mb-1">Roll Number</label>
                    <input type="text" name="roll" class="form-control" placeholder="e.g. 101" required>
                </div>
                <div class="mb-3">
                    <label class="text-secondary small fw-medium mb-1">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g. John Doe" required>
                </div>
                <div class="mb-4">
                    <label class="text-secondary small fw-medium mb-1">Class / Section</label>
                    <input type="text" name="class" class="form-control" placeholder="e.g. CS-A" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 ripple mt-2">
                    <i data-lucide="camera" class="me-2" style="width: 18px; height: 18px;"></i> Capture & Enroll
                </button>
            </form>
        </div>
    </div>
</div>


<!-- Toast representation for SaaS feel instead of window.alert -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050">
    <div id="successToast" class="toast align-items-center text-white bg-success border-0 glass-panel" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex">
            <div class="toast-body fw-medium">
                <i data-lucide="check-circle" class="me-2" style="width: 16px; height: 16px;"></i>
                Student enrolled successfully!
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const toastEl = document.getElementById('successToast');
        if (toastEl) {
            const toast = new bootstrap.Toast(toastEl, { delay: 4000 });
            toast.show();
        }
    });
</script>


                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Responsive Sidebar Toggle Logic
        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const toggleBtn = document.getElementById('sidebarToggleBtn');
            const closeBtn = document.getElementById('closeSidebarBtn');

            function toggleSidebar() {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            }

            if(toggleBtn) toggleBtn.addEventListener('click', toggleSidebar);
            if(closeBtn) closeBtn.addEventListener('click', toggleSidebar);
            if(overlay) overlay.addEventListener('click', toggleSidebar);
        });
    </script>
    
    <!-- Global Toast Container for AI Activity Feed -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer" style="z-index: 1055;">
            <!-- Toasts will be injected dynamically here -->
        </div>
    </div>
    
</body>
</html>
